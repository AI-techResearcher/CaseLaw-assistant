services:
  lawchatbot:
    build: .
    image: caselaw-assistant:latest
    container_name: caselaw-assistant
    ports:
      - "7860:7860"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7860/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
